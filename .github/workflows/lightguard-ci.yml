name: LightGuard CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      LIGHTGUARD_TESTING: "1"
      LIGHTGUARD_TEST_DATABASE_URL: "sqlite:///./lightguard_test.sqlite"
      MOCK_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run SQLite migration
        run: python scripts/migrate_sqlite.py

      - name: Run smoke tests
        run: python -m pytest tests/test_lightguard_smoke.py -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
